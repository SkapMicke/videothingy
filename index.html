<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Converter</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #2b2b2b, #080808);
      color: white;
      min-height: 100vh;
      padding: 28px;
    }
    .app {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(20,20,20,.94);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    h1 { margin: 0 0 8px; }
    .sub { color: #bbb; margin-bottom: 24px; }
    label { display: block; margin-top: 16px; margin-bottom: 7px; font-weight: 700; }
    input, select, button {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: #101010;
      color: white;
    }
    input[type="checkbox"] { width: auto; margin-right: 8px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    button {
      margin-top: 22px;
      background: #ffcc00;
      color: #111;
      border: none;
      font-weight: 900;
      cursor: pointer;
      font-size: 16px;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .log {
      margin-top: 18px;
      height: 170px;
      overflow: auto;
      white-space: pre-wrap;
      background: #050505;
      border-radius: 14px;
      padding: 14px;
      color: #d9d9d9;
      font-size: 13px;
    }
    .downloads a {
      display: block;
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,204,0,.12);
      color: #ffcc00;
      text-decoration: none;
      font-weight: 700;
    }
    .hint { color:#aaa; font-size: 13px; margin-top: 10px; }
    @media (max-width: 700px) { .row { grid-template-columns: 1fr; } body { padding: 14px; } }
  </style>
</head>
<body>
  <main class="app">
    <h1>Video Converter</h1>
    <div class="sub">Konvertera MTS/MP4/MOV/MKV, ta bort ljud, lägg nytt ljud, fade och vattenstämpel direkt i webbläsaren.</div>

    <label>Välj videos</label>
    <input id="videos" type="file" accept="video/*,.mts,.MTS,.m2ts,.M2TS" multiple />

    <div class="row">
      <div>
        <label>Konvertera till</label>
        <select id="format">
          <option value="mp4">MP4</option>
          <option value="mov">MOV</option>
          <option value="mkv">MKV</option>
          <option value="webm">WEBM</option>
        </select>
      </div>
      <div>
        <label>Vattenstämpel</label>
        <input id="watermark" type="text" placeholder="Ex: Simons Dansmedia" />
      </div>
    </div>

    <label>Nytt ljud, valfritt</label>
    <input id="audio" type="file" accept="audio/*,.mp3,.wav,.m4a,.aac" />

    <label><input id="removeAudio" type="checkbox" />Ta bort originalljud</label>

    <div class="row">
      <div>
        <label>Fade in ljud, sekunder</label>
        <input id="fadeIn" type="number" value="2" min="0" />
      </div>
      <div>
        <label>Fade out ljud, sekunder</label>
        <input id="fadeOut" type="number" value="2" min="0" />
      </div>
    </div>

    <button id="startBtn">Bearbeta videos</button>
    <div class="hint">Tips: stora MTS-filer kan ta tid eftersom allt sker lokalt i din webbläsare.</div>

    <div id="log" class="log">Redo.</div>
    <div id="downloads" class="downloads"></div>
  </main>

  <script type="module">
    import { FFmpeg } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js";
    import { fetchFile, toBlobURL } from "https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js";

    const ffmpeg = new FFmpeg();
    const logBox = document.getElementById("log");
    const downloads = document.getElementById("downloads");
    const startBtn = document.getElementById("startBtn");

    function log(text) {
      logBox.textContent += "\n" + text;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function ext(name) {
      return (name.split(".").pop() || "mp4").toLowerCase();
    }

    function safeName(name) {
      return name.replace(/\.[^/.]+$/, "").replace(/[^a-z0-9åäö_-]/gi, "_");
    }

    async function loadFFmpeg() {
      if (ffmpeg.loaded) return;
      logBox.textContent = "Laddar FFmpeg första gången...";
      const baseURL = "https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm";
      await ffmpeg.load({
        coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, "text/javascript"),
        wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, "application/wasm"),
        workerURL: await toBlobURL(`${baseURL}/ffmpeg-core.worker.js`, "text/javascript")
      });
      log("FFmpeg laddat.");
    }

    startBtn.addEventListener("click", async () => {
      const videos = [...document.getElementById("videos").files];
      const audio = document.getElementById("audio").files[0];
      const format = document.getElementById("format").value;
      const watermark = document.getElementById("watermark").value.trim();
      const removeAudio = document.getElementById("removeAudio").checked;
      const fadeIn = Number(document.getElementById("fadeIn").value || 0);
      const fadeOut = Number(document.getElementById("fadeOut").value || 0);

      if (!videos.length) return alert("Välj minst en video.");

      startBtn.disabled = true;
      downloads.innerHTML = "";

      try {
        await loadFFmpeg();

        let audioName = null;
        if (audio) {
          audioName = `new_audio.${ext(audio.name)}`;
          await ffmpeg.writeFile(audioName, await fetchFile(audio));
          log("Ljudfil inläst: " + audio.name);
        }

        for (const video of videos) {
          const inputName = `input_${Date.now()}_${safeName(video.name)}.${ext(video.name)}`;
          const outputName = `${safeName(video.name)}_converted.${format}`;

          log("Läser in: " + video.name);
          await ffmpeg.writeFile(inputName, await fetchFile(video));

          const args = ["-i", inputName];
          if (audioName) args.push("-i", audioName);

          if (watermark) {
            args.push("-vf", `drawtext=text='${watermark.replace(/'/g, "\\'")}':fontcolor=white:fontsize=36:box=1:boxcolor=black@0.45:boxborderw=10:x=w-tw-30:y=h-th-30`);
          }

          if (audioName) {
            args.push("-map", "0:v:0", "-map", "1:a:0");
            const filters = [];
            if (fadeIn > 0) filters.push(`afade=t=in:ss=0:d=${fadeIn}`);
            if (fadeOut > 0) filters.push(`afade=t=out:st=999999:d=${fadeOut}`);
            if (filters.length) args.push("-filter:a", filters.join(","));
            args.push("-shortest");
          } else if (removeAudio) {
            args.push("-an");
          }

          if (format === "webm") {
            args.push("-c:v", "libvpx-vp9", "-c:a", "libopus");
          } else {
            args.push("-c:v", "libx264", "-preset", "veryfast", "-crf", "24");
            if (!removeAudio || audioName) args.push("-c:a", "aac");
          }

          args.push(outputName);
          log("Bearbetar: " + video.name);
          await ffmpeg.exec(args);

          const fileData = await ffmpeg.readFile(outputName);
          const blob = new Blob([fileData.buffer], { type: `video/${format}` });
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = outputName;
          a.textContent = "Ladda ner " + outputName;
          downloads.appendChild(a);
          log("Klar: " + outputName);
        }

        log("Alla videos är klara.");
      } catch (err) {
        console.error(err);
        log("FEL: " + (err.message || err));
      } finally {
        startBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
